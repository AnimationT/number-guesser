<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guesser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <center>
        <h1>Guess the Number</h1>
        <div id="options">
            <button onclick="setRange(1, 10);" id="oneToTen">1-10</button>
            <button onclick="setRange(1, 100);" id="oneToHundred">1-100(default)</button>
            <button onclick="setRange(1, 1000);" id="oneToThousand">1-1000</button>
            <button onclick="showCustomOptions();" id="custom">Custom</button>
            <div id="custOptions" hidden>
                <label for="min">Minimum:</label>
                <input type="number" id="min" placeholder="Enter minimum value">
                <label for="max">Maximum:</label>
                <input type="number" id="max" placeholder="Enter maximum value">
                <button onclick="setCustomRange();">Set Range</button>
            </div>
            <br>
            <br>
            <button onclick="showLimitedGuessOptions();" id="limGuessButton">Limited Guess Settings</button>
            <div id="limGuessOptions" hidden>
                <label for="maxGuesses">Max Guesses:</label>
                <input type="number" id="maxGuesses" placeholder="Enter max guesses">
                <button onclick="setLimitedGuessMode();">Set Limited Guess Mode</button>
                <button onclick="turnOffLimGuess();">Turn Off</button>
            </div>
            <br>
            <br>
            <button onclick="showTimedGuessOptions();" id="timedGuessButton">Time Limit Settings</button>
            <div id="timedGuessOptions" hidden>
                <label for="timeLimit">Time Limit (seconds):</label>
                <input type="number" id="timeLimit" placeholder="Enter time limit">
                <button onclick="setTimedGuessMode();">Set Time Limit</button>
                <button onclick="turnOffTimedGuess();">Turn Off</button>
            </div>
            <br>
            <br>
            <button onclick="proceed();">proceed</button>
        </div>
        <br>
        <input type="text" id="guessBox" placeholder="Guess the number here" autocomplete="off" disabled>
    <button onclick="guess();" id="guessButton" disabled>Guess</button>
    <p id="timer"></p>
    <br>
    <div id="clues"></div>
    </center>
    <button onclick="showHistory();">Game History</button>
    <div id="history" hidden>
        <h2>Game History</h2>
        <p id="last1Game"></p>
        <p id="last2Game"></p>
        <p id="last3Game"></p>
    </div>
</body>
</html>
