<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guesser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <center>
        <h1>Guess the Number</h1>
        <div id="options">
            <button onclick="setRange(1, 10);">1-10</button>
            <button onclick="setRange(1, 100);">1-100(default)</button>
            <button onclick="setRange(1, 1000);">1-1000</button>
            <button onclick="showCustomOptions();">Custom</button>
            <div id="custOptions" hidden>
                <label for="min">Minimum:</label>
                <input type="number" id="min" placeholder="Enter minimum value">
                <label for="max">Maximum:</label>
                <input type="number" id="max" placeholder="Enter maximum value">
                <button onclick="setCustomRange();">Set Range</button>
            </div>
            <br>
            <br>
            <button onclick="showLimitedGuessOptions();">Limited Guess Mode</button>
            <div id="limGuessOptions" hidden>
                <label for="maxGuesses">Max Guesses:</label>
                <input type="number" id="maxGuesses" placeholder="Enter max guesses">
                <button onclick="setLimitedGuessMode();">Set Limited Guess Mode</button>
                <button onclick="turnOffLimGuess();">Turn Off</button>
            </div>
            <br>
            <br>
            <button onclick="proceed();">proceed</button>
        </div>
        <br>
        <input type="text" id="guessBox" placeholder="Guess the number here" autocomplete="off" disabled>
    <button onclick="guess();" id="guessButton">Guess</button>
    <p id="timer"></p>
    <br>
    <div id="clues"></div>
    </center>
    
</body>
</html>
